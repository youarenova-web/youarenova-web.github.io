<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Montserrat Alternates', sans-serif;
background:
radial-gradient(circle at 20% 20%, rgba(196, 58, 255, 0.20), transparent 35%),
radial-gradient(circle at 80% 30%, rgba(255, 0, 153, 0.16), transparent 30%),
linear-gradient(135deg, #05030a 0%, #11071d 45%, #05030a 100%);
color: #fff;
}

/* FADE IN */

@keyframes fadeIn {
from {opacity:0; transform:translateY(10px);}
to {opacity:1; transform:translateY(0);}
}

/* FLOAT */

@keyframes float {
0% {transform: rotate(-3deg) translateY(0);}
50% {transform: rotate(-3deg) translateY(-8px);}
100% {transform: rotate(-3deg) translateY(0);}
}

/* GLOW */

@keyframes glow {
0% {opacity:0.7;}
50% {opacity:1;}
100% {opacity:0.7;}
}

.page {
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
animation:fadeIn 1s ease;
}

.hero {
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:center;
max-width:1300px;
width:100%;
}

/* TEXT */

h1 {
font-size: clamp(60px,8vw,120px);
line-height:0.9;
font-weight:800;
margin-bottom:20px;
}

.subline {
font-size:20px;
margin-bottom:30px;
line-height:1.6;
}

/* BUTTON */

.button {
padding:16px 30px;
border-radius:14px;
background:linear-gradient(90deg,#ff1fbf,#8b5cf6);
color:white;
text-decoration:none;
font-weight:700;
box-shadow:0 15px 40px rgba(255,0,170,0.4);
}

/* VISUAL */

.visual {
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

/* GLOW */

.visual::before {
content:"";
position:absolute;
width:90%;
height:90%;
border-radius:50%;
background: radial-gradient(circle, rgba(255,0,170,0.25), transparent 70%);
filter: blur(40px);
animation:glow 6s ease-in-out infinite;
}

/* CARD */

.card {
width:420px;
height:600px;
border-radius:30px;
overflow:hidden;
box-shadow:0 40px 100px rgba(0,0,0,0.6);
transform:rotate(-3deg);
animation:float 6s ease-in-out infinite;
}

/* BILD – WICHTIG */

.card img {
width:100%;
height:100%;
object-fit:cover;

/* 🔥 HIER PASSIERT DER MAGIC */
object-position: center 35%;
}

/* MOBILE */

@media(max-width:900px){
.hero {
grid-template-columns:1fr;
text-align:center;
}

.card {
width:320px;
height:460px;
transform:none;
animation:none;
}
}
</style>
</head>

<body>

<div class="page">
<div class="hero">

<div>
<h1>YOU ARE<br>NOVA</h1>

<p class="subline">
Coming Soon.<br><br>
Folge jetzt auf Instagram und<br>
begleite den Start von Nova.
</p>

<a href="https://instagram.com/youarenova.ai" class="button">
Jetzt folgen
</a>
</div>

<div class="visual">
<div class="card">
<img src="Nova-final.jpg">
</div>
</div>

</div>
</div>

</body>
</html>
