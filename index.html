<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

html, body {
width: 100%;
height: 100%;
}

body {
font-family: 'Montserrat Alternates', sans-serif;
background:
radial-gradient(circle at 20% 20%, rgba(196, 58, 255, 0.20), transparent 35%),
radial-gradient(circle at 80% 30%, rgba(255, 0, 153, 0.16), transparent 30%),
linear-gradient(135deg, #05030a 0%, #11071d 45%, #05030a 100%);
color: #ffffff;
overflow: hidden;
}

.page {
position: relative;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 40px;
isolation: isolate;
}

.page::before {
content: "";
position: absolute;
inset: 0;
background: radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.35) 100%);
z-index: -2;
}

.page::after {
content: "";
position: absolute;
width: 520px;
height: 520px;
border-radius: 50%;
background: radial-gradient(circle, rgba(170, 0, 255, 0.20) 0%, rgba(255, 0, 170, 0.08) 40%, transparent 72%);
filter: blur(40px);
right: 12%;
top: 50%;
transform: translateY(-50%);
z-index: -1;
}

.hero {
width: 100%;
max-width: 1320px;
display: grid;
grid-template-columns: 1.05fr 0.95fr;
gap: 40px;
align-items: center;
}

.copy {
max-width: 640px;
}

.kicker {
display: inline-block;
margin-bottom: 18px;
padding: 10px 16px;
border: 1px solid rgba(255,255,255,0.12);
border-radius: 999px;
background: rgba(255,255,255,0.04);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
font-size: 13px;
font-weight: 700;
letter-spacing: 1.4px;
text-transform: uppercase;
color: rgba(255,255,255,0.82);
}

h1 {
font-size: clamp(54px, 8vw, 118px);
line-height: 0.9;
letter-spacing: 2px;
font-weight: 800;
text-transform: uppercase;
margin-bottom: 24px;
text-shadow: 0 8px 30px rgba(0,0,0,0.35);
}

.subline {
font-size: clamp(18px, 2vw, 24px);
line-height: 1.55;
color: rgba(255,255,255,0.92);
max-width: 560px;
margin-bottom: 34px;
}

.actions {
display: flex;
align-items: center;
gap: 16px;
flex-wrap: wrap;
}

.button {
display: inline-flex;
align-items: center;
justify-content: center;
padding: 17px 32px;
border-radius: 16px;
text-decoration: none;
font-size: 16px;
font-weight: 800;
letter-spacing: 0.2px;
color: #fff;
background: linear-gradient(90deg, #ff1fbf 0%, #8b5cf6 100%);
box-shadow: 0 14px 36px rgba(255, 31, 191, 0.28);
transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
}

.button:hover {
transform: translateY(-2px);
box-shadow: 0 18px 42px rgba(255, 31, 191, 0.38);
opacity: 0.98;
}

.note {
font-size: 14px;
line-height: 1.5;
color: rgba(255,255,255,0.62);
}

.visual-wrap {
position: relative;
display: flex;
justify-content: center;
align-items: center;
min-height: 640px;
}

.visual-glow {
position: absolute;
width: 82%;
height: 82%;
border-radius: 50%;
background: radial-gradient(circle, rgba(183, 71, 255, 0.30) 0%, rgba(255, 0, 170, 0.12) 35%, transparent 72%);
filter: blur(34px);
}

.visual-card {
position: relative;
width: min(100%, 500px);
aspect-ratio: 4 / 5.2;
border-radius: 34px;
overflow: hidden;
background: rgba(255,255,255,0.03);
border: 1px solid rgba(255,255,255,0.10);
box-shadow:
0 30px 90px rgba(0,0,0,0.45),
0 0 0 1px rgba(255,255,255,0.04) inset;
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
transform: rotate(-4deg);
}

.visual-card img {
width: 100%;
height: 100%;
object-fit: cover;
object-position: center center;
display: block;
filter: brightness(0.92) contrast(1.05) saturate(1.02);
}

.visual-card::after {
content: "";
position: absolute;
inset: 0;
background:
linear-gradient(to top, rgba(5,3,10,0.52) 0%, rgba(5,3,10,0.12) 38%, rgba(255,255,255,0.02) 100%);
pointer-events: none;
}

.floating-tag {
position: absolute;
right: -10px;
bottom: 36px;
padding: 12px 16px;
border-radius: 18px;
background: rgba(10,10,18,0.55);
border: 1px solid rgba(255,255,255,0.10);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
font-size: 13px;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
color: rgba(255,255,255,0.88);
box-shadow: 0 12px 30px rgba(0,0,0,0.28);
}

@media (max-width: 980px) {
body {
overflow-y: auto;
overflow-x: hidden;
}

.page {
padding: 28px 20px 36px;
}

.hero {
grid-template-columns: 1fr;
gap: 26px;
text-align: center;
}

.copy {
max-width: 760px;
margin: 0 auto;
}

.subline {
margin-left: auto;
margin-right: auto;
}

.actions {
justify-content: center;
}

.visual-wrap {
min-height: auto;
padding-top: 10px;
}

.visual-card {
width: min(100%, 420px);
transform: none;
}

.floating-tag {
right: 8px;
bottom: 18px;
}
}

@media (max-width: 640px) {
h1 {
font-size: 52px;
}

.subline {
font-size: 17px;
}

.button {
width: 100%;
padding: 16px 24px;
}

.actions {
gap: 12px;
}

.note {
width: 100%;
}
}
</style>
</head>
<body>

<div class="page">
<section class="hero">

<div class="copy">
<div class="kicker">Nova is coming</div>

<h1>YOU ARE<br>NOVA</h1>

<p class="subline">
Coming Soon.

Folge jetzt auf Instagram und
begleite den Start von Nova.
</p>

<div class="actions">
<a class="button" href="https://instagram.com/youarenova.ai" target="_blank" rel="noopener noreferrer">
Jetzt auf Instagram folgen
</a>
<div class="note">Mystisch. Modern. Unübersehbar.</div>
</div>
</div>

<div class="visual-wrap">
<div class="visual-glow"></div>

<div class="visual-card">
<img src="Nova.jpg" alt="Nova">
</div>

<div class="floating-tag">SuperNova Energy</div>
</div>

</section>
</div>

</body>
</html>
