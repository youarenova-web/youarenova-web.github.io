<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

html, body {
width: 100%;
height: 100%;
font-family: 'Montserrat Alternates', sans-serif;
overflow: hidden;
}

body {
background: #000;
color: #fff;
}

/* HERO */

.hero {
position: relative;
width: 100%;
height: 100vh;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
overflow: hidden;
}

/* BILD – NATÜRLICH + LEICHT NACH UNTEN */

.hero-image {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
object-position: center 80%;
z-index: 0;
}

/* OVERLAY */

.hero::after {
content: "";
position: absolute;
inset: 0;
background: linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.75));
z-index: 1;
}

/* TEXT */

.content {
position: relative;
z-index: 2;
max-width: 700px;
padding: 20px;
}

/* HEADLINE */

h1 {
font-size: clamp(42px, 8vw, 90px);
line-height: 0.95;
letter-spacing: 3px;
margin-bottom: 20px;
font-weight: 700;
text-transform: uppercase;
}

/* TEXT */

p {
font-size: clamp(16px, 2.2vw, 22px);
line-height: 1.5;
margin-bottom: 35px;
color: rgba(255,255,255,0.95);
}

/* BUTTON */

.button {
display: inline-block;
padding: 16px 32px;
border-radius: 14px;
text-decoration: none;
font-size: 16px;
font-weight: 700;
color: #fff;
background: linear-gradient(90deg, #ff1fbf, #8b5cf6);
box-shadow: 0 12px 35px rgba(255, 31, 191, 0.35);
transition: all 0.25s ease;
}

.button:hover {
transform: translateY(-3px) scale(1.02);
box-shadow: 0 18px 45px rgba(255, 31, 191, 0.45);
}

/* MOBILE FIX */

@media (max-width: 640px) {

.hero-image {
object-position: center 85%;
}

h1 {
font-size: 42px;
}

p {
font-size: 16px;
}

}
</style>
</head>

<body>

<section class="hero">

<img src="Nova.jpg" alt="Nova" class="hero-image">

<div class="content">

<h1>YOU ARE NOVA</h1>

<p>
Coming Soon.<br><br>
Folge jetzt auf Instagram und<br>
begleite den Start von Nova.
</p>

<a class="button" href="https://instagram.com/youarenova.ai" target="_blank">
Jetzt auf Instagram folgen
</a>

</div>

</section>

</body>
</html>
