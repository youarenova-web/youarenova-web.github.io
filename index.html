<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova – Coming soon</title>
  <style>
    :root {
      --bg-dark: #05010a;
      --bg-mid: #11031d;
      --accent-1: rgba(211, 0, 255, 0.22);
      --accent-2: rgba(255, 0, 170, 0.18);
      --accent-3: rgba(120, 0, 255, 0.16);
      --text: #ffffff;
      --text-soft: rgba(255,255,255,0.82);
      --line: rgba(255,255,255,0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 0, 170, 0.10), transparent 28%),
        radial-gradient(circle at 80% 25%, rgba(170, 0, 255, 0.12), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(120, 0, 255, 0.10), transparent 36%),
        linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-dark) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      position: relative;
    }

    .page {
      position: relative;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
    }

    .bg-orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(70px);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.9;
      animation: drift 16s ease-in-out infinite alternate;
    }

    .bg-orb.orb-1 {
      width: 380px;
      height: 380px;
      left: -80px;
      top: 8%;
      background: rgba(255, 0, 180, 0.18);
    }

    .bg-orb.orb-2 {
      width: 420px;
      height: 420px;
      right: -120px;
      top: 14%;
      background: rgba(160, 0, 255, 0.16);
      animation-duration: 20s;
    }

    .bg-orb.orb-3 {
      width: 360px;
      height: 360px;
      left: 18%;
      bottom: -120px;
      background: rgba(111, 0, 255, 0.14);
      animation-duration: 18s;
    }

    @keyframes drift {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      100% {
        transform: translate3d(25px, -18px, 0) scale(1.08);
      }
    }

    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,0,200,0.5) 30%, rgba(140,0,255,0.08) 70%, transparent 100%);
      box-shadow:
        0 0 10px rgba(255, 0, 200, 0.35),
        0 0 20px rgba(170, 0, 255, 0.18);
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(40px) scale(0.8);
        opacity: 0;
      }
      15% {
        opacity: 0.55;
      }
      85% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-120vh) scale(1.15);
        opacity: 0;
      }
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      justify-items: center;
    }

    .hero {
      position: relative;
      width: min(1100px, 100%);
      min-height: 78vh;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 0 60px rgba(190, 0, 255, 0.10);
      background: #07020d;
      isolation: isolate;
    }

    .image-stack {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 38%;
      transform: scale(1.04);
      will-change: opacity, transform;
      filter: saturate(1.02) contrast(1.06) brightness(0.88);
    }

    .hero-image.image-1 {
      opacity: 1;
      animation: fadeOne 14s ease-in-out infinite;
    }

    .hero-image.image-2 {
      opacity: 0;
      animation: fadeTwo 14s ease-in-out infinite;
    }

    @keyframes fadeOne {
      0%   { opacity: 1; transform: scale(1.04); }
      40%  { opacity: 1; transform: scale(1.06); }
      50%  { opacity: 0; transform: scale(1.065); }
      90%  { opacity: 0; transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1.04); }
    }

    @keyframes fadeTwo {
      0%   { opacity: 0; transform: scale(1.04); }
      40%  { opacity: 0; transform: scale(1.05); }
      50%  { opacity: 1; transform: scale(1.06); }
      90%  { opacity: 1; transform: scale(1.04); }
      100% { opacity: 0; transform: scale(1.04); }
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(5,1,10,0.10) 0%, rgba(5,1,10,0.22) 22%, rgba(5,1,10,0.48) 72%, rgba(5,1,10,0.74) 100%),
        radial-gradient(circle at 70% 28%, rgba(255,0,170,0.10), transparent 28%),
        radial-gradient(circle at 28% 18%, rgba(150,0,255,0.12), transparent 32%);
    }

    .shimmer {
      position: absolute;
      inset: -20%;
      z-index: 1;
      background: linear-gradient(
        115deg,
        transparent 35%,
        rgba(255,255,255,0.04) 50%,
        transparent 65%
      );
      transform: translateX(-40%) rotate(0.001deg);
      animation: shimmerMove 9s ease-in-out infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    @keyframes shimmerMove {
      0% {
        transform: translateX(-45%) skewX(-12deg);
        opacity: 0;
      }
      20% {
        opacity: 0.55;
      }
      50% {
        transform: translateX(30%) skewX(-12deg);
        opacity: 0.22;
      }
      100% {
        transform: translateX(70%) skewX(-12deg);
        opacity: 0;
      }
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 78vh;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: clamp(28px, 4vw, 54px);
    }

    .text {
      max-width: 620px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.88rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 8vw, 6.8rem);
      line-height: 0.94;
      letter-spacing: -0.04em;
      font-weight: 700;
      text-shadow:
        0 10px 30px rgba(0,0,0,0.35),
        0 0 24px rgba(185, 0, 255, 0.10);
    }

    .coming {
      margin-top: 18px;
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.5;
      color: var(--text-soft);
      max-width: 520px;
      text-shadow: 0 6px 18px rgba(0,0,0,0.3);
    }

    .coming .line-break-space {
      display: block;
      height: 18px;
    }

    .cta-row {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 14px 22px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.98rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(255, 0, 170, 0.20), rgba(145, 0, 255, 0.22));
      box-shadow:
        0 8px 30px rgba(173, 0, 255, 0.22),
        inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.28);
      box-shadow:
        0 12px 34px rgba(0,0,0,0.20),
        0 0 24px rgba(215, 0, 255, 0.10);
    }

    .footer-note {
      position: absolute;
      left: clamp(28px, 4vw, 54px);
      right: clamp(28px, 4vw, 54px);
      bottom: 18px;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: rgba(255,255,255,0.54);
      font-size: 0.84rem;
      letter-spacing: 0.03em;
    }

    .footer-note::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -12px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
    }

    @media (max-width: 900px) {
      .hero {
        min-height: 86vh;
      }

      .content {
        min-height: 86vh;
        align-items: flex-end;
      }

      .hero-image {
        object-position: center 30%;
      }

      .footer-note {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;
        margin: 0 clamp(28px, 4vw, 54px) 24px;
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 10px;
      }

      .hero {
        border-radius: 20px;
        min-height: 100svh;
      }

      .content {
        min-height: 100svh;
        padding: 24px 20px 34px;
      }

      .hero-image {
        object-position: center 26%;
      }

      h1 {
        font-size: clamp(2.6rem, 15vw, 4rem);
      }

      .coming {
        font-size: 1rem;
      }

      .cta-row {
        width: 100%;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="particles" id="particles"></div>

    <div class="wrap">
      <section class="hero">
        <div class="image-stack">
          <img src="Nova-final-01.jpg" alt="Nova" class="hero-image image-1" />
          <img src="Nova-final.jpg" alt="Nova alternative" class="hero-image image-2" />
        </div>

        <div class="image-overlay"></div>
        <div class="shimmer"></div>

        <div class="content">
          <div class="text">
            <div class="eyebrow">You are not here by accident</div>

            <h1>NOVA</h1>

            <div class="coming">
              Coming soon.
              <span class="line-break-space"></span>
              Mystisch. Klar. Anders.
            </div>

            <div class="cta-row">
              <a class="btn btn-primary" href="https://instagram.com/" target="_blank" rel="noopener noreferrer">Follow on Instagram</a>
              <a class="btn btn-secondary" href="mailto:hello@youarenova.ai">Contact</a>
            </div>
          </div>
        </div>

        <div class="footer-note">
          <span>youarenova.ai</span>
          <span>Enter the frequency</span>
        </div>
      </section>
    </div>
  </main>

  <script>
    const container = document.getElementById('particles');
    const particleCount = 26;

    for (let i = 0; i < particleCount; i++) {
      const p = document.createElement('span');
      p.className = 'particle';

      const size = Math.random() * 5 + 2;
      const left = Math.random() * 100;
      const delay = Math.random() * 10;
      const duration = Math.random() * 12 + 14;

      p.style.width = `${size}px`;
      p.style.height = `${size}px`;
      p.style.left = `${left}%`;
      p.style.bottom = `${Math.random() * 20 - 10}vh`;
      p.style.animationDelay = `${delay}s`;
      p.style.animationDuration = `${duration}s`;

      container.appendChild(p);
    }
  </script>
</body>
</html>
