<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova — Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.78);
      --line: rgba(255,255,255,0.12);
      --glass: rgba(255,255,255,0.08);
      --shadow: 0 20px 80px rgba(0,0,0,0.45);
      --magenta: rgba(255, 0, 170, 0.24);
      --violet: rgba(160, 80, 255, 0.20);
      --button-glow: 0 0 30px rgba(255, 0, 170, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat Alternates", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      position: relative;
    }

    .background {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 0, 170, 0.12), transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(140, 70, 255, 0.10), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.04), transparent 30%),
        #050505;
    }

    .image-layer {
      position: absolute;
      inset: 0;
      background-image: url("Nova-final-01.jpg");
      background-size: cover;
      background-position: center center;
      opacity: 0.92;
      transform: scale(1);
      animation: slowZoom 18s ease-in-out infinite alternate;
      filter: saturate(1.02) contrast(1.08) brightness(0.92);
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.34), rgba(0,0,0,0.46)),
        radial-gradient(circle at 50% 45%, rgba(255, 0, 170, 0.10), transparent 38%),
        radial-gradient(circle at 50% 50%, rgba(140, 70, 255, 0.08), transparent 40%);
      pointer-events: none;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.65;
      pointer-events: none;
      mix-blend-mode: screen;
      animation: floatGlow 10s ease-in-out infinite;
    }

    .glow.one {
      width: 320px;
      height: 320px;
      left: 10%;
      top: 12%;
      background: rgba(255, 0, 170, 0.16);
    }

    .glow.two {
      width: 380px;
      height: 380px;
      right: 8%;
      top: 20%;
      background: rgba(140, 70, 255, 0.14);
      animation-delay: -3s;
    }

    .glow.three {
      width: 260px;
      height: 260px;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      background: rgba(255, 0, 170, 0.12);
      animation-delay: -6s;
    }

    canvas#particles {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.55;
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .content {
      width: 100%;
      max-width: 760px;
      text-align: center;
      padding: 24px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(2.8rem, 9vw, 6.8rem);
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      text-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    .coming {
      display: block;
    }

    .soon {
      display: block;
      margin-top: 6px;
      background: linear-gradient(90deg, #ffffff 0%, #ffd7f3 35%, #f4b0ff 65%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: shimmer 8s linear infinite;
    }

    .subline {
      margin-top: 26px;
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.65;
      color: var(--muted);
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
      text-shadow: 0 4px 16px rgba(0,0,0,0.28);
    }

    .cta-wrap {
      margin-top: 34px;
      display: flex;
      justify-content: center;
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 240px;
      padding: 17px 28px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
      color: #ffffff;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
      box-shadow: var(--shadow), var(--button-glow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease, background 0.35s ease;
      overflow: hidden;
    }

    .cta::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent 0%,
        rgba(255,255,255,0.18) 30%,
        transparent 60%
      );
      transform: translateX(-120%);
      transition: transform 0.8s ease;
    }

    .cta:hover {
      transform: translateY(-2px) scale(1.015);
      border-color: rgba(255,255,255,0.32);
      box-shadow:
        0 24px 90px rgba(0,0,0,0.50),
        0 0 38px rgba(255, 0, 170, 0.24);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.07));
    }

    .cta:hover::before {
      transform: translateX(120%);
    }

    .cta:active {
      transform: translateY(0) scale(0.995);
    }

    .cta svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.04em;
    }

    @keyframes slowZoom {
      0% {
        transform: scale(1);
      }
      100% {
        transform: scale(1.08);
      }
    }

    @keyframes floatGlow {
      0%, 100% {
        transform: translateY(0px) translateX(0px);
      }
      50% {
        transform: translateY(-12px) translateX(8px);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 0% center;
      }
      100% {
        background-position: 200% center;
      }
    }

    @media (max-width: 768px) {
      .content {
        padding: 12px;
      }

      .subline {
        margin-top: 22px;
        font-size: 0.98rem;
        line-height: 1.6;
      }

      .cta {
        width: 100%;
        max-width: 300px;
        padding: 16px 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .image-layer,
      .glow,
      .soon,
      .cta::before {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="image-layer"></div>
    <div class="image-overlay"></div>

    <div class="glow one"></div>
    <div class="glow two"></div>
    <div class="glow three"></div>

    <canvas id="particles"></canvas>
  </div>

  <main class="page">
    <section class="content">
      <div class="eyebrow">Nova</div>

      <h1>
        <span class="coming">Coming</span>
        <span class="soon">Soon</span>
      </h1>

      <p class="subline">
        You were not here by accident.
      </p>

      <div class="cta-wrap">
        <a class="cta" href="https://youarenova.ai" target="_blank" rel="noopener noreferrer" aria-label="Follow Nova">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 2H17C19.7614 2 22 4.23858 22 7V17C22 19.7614 19.7614 22 17 22H7C4.23858 22 2 19.7614 2 17V7C2 4.23858 4.23858 2 7 2Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M16.5 11.37C16.6234 12.2022 16.4813 13.0521 16.0943 13.799C15.7073 14.5459 15.0953 15.1524 14.3451 15.5326C13.5949 15.9128 12.7438 16.0469 11.9128 15.916C11.0818 15.785 10.3134 15.3958 9.71677 14.8047C9.12014 14.2135 8.72385 13.4488 8.58524 12.619C8.44664 11.7891 8.57295 10.9368 8.94635 10.1832C9.31975 9.42962 9.92062 8.81207 10.6639 8.41821C11.4072 8.02435 12.2558 7.87441 13.0891 7.98999C13.9391 8.10786 14.726 8.49529 15.3324 9.09516C15.9388 9.69502 16.3349 10.4776 16.46 11.3265" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M17.5 6.5H17.51" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Follow On Instagram
        </a>
      </div>

      <div class="footer-note">Enter the frequency.</div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    let particles = [];
    let w = 0;
    let h = 0;

    function resizeCanvas() {
      w = canvas.width = window.innerWidth * window.devicePixelRatio;
      h = canvas.height = window.innerHeight * window.devicePixelRatio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      createParticles();
    }

    function createParticles() {
      particles = [];
      const count = window.innerWidth < 768 ? 28 : 42;

      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.8 + 0.4,
          vx: (Math.random() - 0.5) * 0.12,
          vy: (Math.random() - 0.5) * 0.12,
          a: Math.random() * 0.45 + 0.08,
          pulse: Math.random() * Math.PI * 2
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.pulse += 0.01;

        if (p.x < -20) p.x = window.innerWidth + 20;
        if (p.x > window.innerWidth + 20) p.x = -20;
        if (p.y < -20) p.y = window.innerHeight + 20;
        if (p.y > window.innerHeight + 20) p.y = -20;

        const alpha = p.a + Math.sin(p.pulse) * 0.05;

        const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 8);
        gradient.addColorStop(0, `rgba(255, 120, 220, ${alpha})`);
        gradient.addColorStop(0.5, `rgba(180, 100, 255, ${alpha * 0.45})`);
        gradient.addColorStop(1, "rgba(255, 255, 255, 0)");

        ctx.beginPath();
        ctx.fillStyle = gradient;
        ctx.arc(p.x, p.y, p.r * 8, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(drawParticles);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    drawParticles();
  </script>
</body>
</html>
