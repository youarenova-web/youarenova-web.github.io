<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova — Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #040404;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.78);
      --muted-soft: rgba(255,255,255,0.50);
      --line: rgba(255,255,255,0.16);
      --magenta: rgba(255, 0, 170, 0.24);
      --violet: rgba(160, 80, 255, 0.20);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat Alternates", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      position: relative;
    }

    .background {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 0, 170, 0.12), transparent 36%),
        radial-gradient(circle at 82% 28%, rgba(140, 70, 255, 0.10), transparent 34%),
        radial-gradient(circle at 50% 82%, rgba(255,255,255,0.03), transparent 30%),
        #040404;
    }

    .image-layer {
      position: absolute;
      inset: 0;
      background-image: url("Nova-final-01.jpg");
      background-size: cover;
      background-position: center center;
      opacity: 0.93;
      transform: scale(1);
      animation: slowZoom 20s ease-in-out infinite alternate;
      filter: saturate(1.02) contrast(1.1) brightness(0.88);
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.30), rgba(0,0,0,0.52)),
        radial-gradient(circle at 50% 46%, rgba(255, 0, 170, 0.09), transparent 38%),
        radial-gradient(circle at 50% 52%, rgba(140, 70, 255, 0.08), transparent 42%);
      pointer-events: none;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.62;
      pointer-events: none;
      mix-blend-mode: screen;
      animation: floatGlow 11s ease-in-out infinite;
    }

    .glow.one {
      width: 340px;
      height: 340px;
      left: 8%;
      top: 10%;
      background: rgba(255, 0, 170, 0.14);
    }

    .glow.two {
      width: 400px;
      height: 400px;
      right: 6%;
      top: 18%;
      background: rgba(140, 70, 255, 0.13);
      animation-delay: -3s;
    }

    .glow.three {
      width: 280px;
      height: 280px;
      left: 50%;
      bottom: 6%;
      transform: translateX(-50%);
      background: rgba(255, 0, 170, 0.10);
      animation-delay: -6s;
    }

    canvas#particles {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.52;
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .content {
      width: 100%;
      max-width: 760px;
      text-align: center;
      padding: 24px;
      transform: translateY(-20px);
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.76);
      margin-bottom: 18px;
      text-shadow: 0 4px 18px rgba(0,0,0,0.30);
    }

    h1 {
      font-size: clamp(2.9rem, 9vw, 6.9rem);
      line-height: 0.94;
      font-weight: 700;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      text-shadow: 0 10px 30px rgba(0,0,0,0.34);
    }

    .coming {
      display: block;
    }

    .soon {
      display: block;
      margin-top: 4px;
      background: linear-gradient(90deg, #ffffff 0%, #ffe0f6 34%, #f1b8ff 68%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: shimmer 8s linear infinite;
    }

    .subline {
      margin-top: 24px;
      font-size: clamp(1rem, 2vw, 1.14rem);
      line-height: 1.65;
      color: var(--muted);
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
      text-shadow: 0 4px 18px rgba(0,0,0,0.30);
    }

    .cta-wrap {
      margin-top: 34px;
      display: flex;
      justify-content: center;
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 250px;
      padding: 17px 30px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.22);
      background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
      color: #ffffff;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
      box-shadow:
        0 30px 100px rgba(0,0,0,0.55),
        0 0 45px rgba(255, 0, 170, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition:
        transform 0.35s ease,
        box-shadow 0.35s ease,
        border-color 0.35s ease,
        background 0.35s ease;
      overflow: hidden;
    }

    .cta::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent 0%,
        rgba(255,255,255,0.22) 30%,
        transparent 60%
      );
      transform: translateX(-120%);
      transition: transform 0.9s ease;
    }

    .cta:hover {
      transform: translateY(-2px) scale(1.018);
      border-color: rgba(255,255,255,0.34);
      background: linear-gradient(180deg, rgba(255,255,255,0.26), rgba(255,255,255,0.10));
      box-shadow:
        0 34px 110px rgba(0,0,0,0.60),
        0 0 56px rgba(255, 0, 170, 0.42);
    }

    .cta:hover::before {
      transform: translateX(120%);
    }

    .cta:active {
      transform: translateY(0) scale(0.995);
    }

    .cta svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.82rem;
      color: var(--muted-soft);
      letter-spacing: 0.04em;
      text-shadow: 0 4px 12px rgba(0,0,0,0.25);
    }

    @keyframes slowZoom {
      0% {
        transform: scale(1);
      }
      100% {
        transform: scale(1.075);
      }
    }

    @keyframes floatGlow {
      0%, 100% {
        transform: translateY(0px) translateX(0px);
      }
      50% {
        transform: translateY(-12px) translateX(8px);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 0% center;
      }
      100% {
        background-position: 200% center;
      }
    }

    @media (max-width: 768px) {
      .content {
        padding: 12px;
        transform: translateY(-10px);
      }

      .subline {
        margin-top: 22px;
        font-size: 0.98rem;
        line-height: 1.6;
      }

      .cta {
        width: 100%;
        max-width: 310px;
        padding: 16px 24px;
      }

      .footer-note {
        font-size: 0.78rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .image-layer,
      .glow,
      .soon,
      .cta::before {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="image-layer"></div>
    <div class="image-overlay"></div>

    <div class="glow one"></div>
    <div class="glow two"></div>
    <div class="glow three"></div>

    <canvas id="particles"></canvas>
  </div>

  <main class="page">
    <section class="content">
      <div class="eyebrow">Nova</div>

      <h1>
        <span class="coming">Coming</span>
        <span class="soon">Soon</span>
      </h1>

      <p class="subline">
        You were meant to find this.
      </p>

      <div class="cta-wrap">
        <a class="cta" href="https://instagram.com/youarenova.ai" target="_blank" rel="noopener noreferrer" aria-label="Follow Nova on Instagram">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 2H17C19.7614 2 22 4.23858 22 7V17C22 19.7614 19.7614 22 17 22H7C4.23858 22 2 19.7614 2 17V7C2 4.23858 4.23858 2 7 2Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M16.5 11.37C16.6234 12.2022 16.4813 13.0521 16.0943 13.799C15.7073 14.5459 15.0953 15.1524 14.3451 15.5326C13.5949 15.9128 12.7438 16.0469 11.9128 15.916C11.0818 15.785 10.3134 15.3958 9.71677 14.8047C9.12014 14.2135 8.72385 13.4488 8.58524 12.619C8.44664 11.7891 8.57295 10.9368 8.94635 10.1832C9.31975 9.42962 9.92062 8.81207 10.6639 8.41821C11.4072 8.02435 12.2558 7.87441 13.0891 7.98999C13.9391 8.10786 14.726 8.49529 15.3324 9.09516C15.9388 9.69502 16.3349 10.4776 16.46 11.3265" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M17.5 6.5H17.51" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Follow On Instagram
        </a>
      </div>

      <div class="footer-note">Enter the frequency.</div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    let particles = [];

    function resizeCanvas() {
      const ratio = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * ratio;
      canvas.height = window.innerHeight * ratio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(ratio, ratio);
      createParticles();
    }

    function createParticles() {
      particles = [];
      const count = window.innerWidth < 768 ? 28 : 44;

      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.8 + 0.35,
          vx: (Math.random() - 0.5) * 0.10,
          vy: (Math.random() - 0.5) * 0.10,
          a: Math.random() * 0.42 + 0.08,
          pulse: Math.random() * Math.PI * 2
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.pulse += 0.01;

        if (p.x < -20) p.x = window.innerWidth + 20;
        if (p.x > window.innerWidth + 20) p.x = -20;
        if (p.y < -20) p.y = window.innerHeight + 20;
        if (p.y > window.innerHeight + 20) p.y = -20;

        const alpha = p.a + Math.sin(p.pulse) * 0.04;

        const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 9);
        gradient.addColorStop(0, `rgba(255, 120, 220, ${alpha})`);
        gradient.addColorStop(0.45, `rgba(180, 100, 255, ${alpha * 0.42})`);
        gradient.addColorStop(1, "rgba(255,255,255,0)");

        ctx.beginPath();
        ctx.fillStyle = gradient;
        ctx.arc(p.x, p.y, p.r * 9, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(drawParticles);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    drawParticles();
  </script>
</body>
</html>
