<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova — Coming Soon</title>
  <meta name="description" content="Nova is coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #05020a;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.82);
      --line: rgba(255,255,255,0.18);
      --glass: rgba(255,255,255,0.08);
      --shadow: rgba(0,0,0,0.45);
      --violet: rgba(155, 92, 255, 0.28);
      --pink: rgba(255, 66, 163, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat Alternates", sans-serif;
      overflow: hidden;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 0, 128, 0.08), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(120, 0, 255, 0.10), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(255, 0, 90, 0.10), transparent 35%),
        #05020a;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to bottom, rgba(0,0,0,0.28), rgba(0,0,0,0.42)),
        url("Nova-final-01.jpg");
      background-size: cover;
      background-position: center 22%;
      transform: scale(1.035);
      filter: saturate(1.04) contrast(1.08) brightness(0.82);
      animation: slowFloat 14s ease-in-out infinite alternate;
    }

    .bg-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 60, 170, 0.18), transparent 24%),
        radial-gradient(circle at 52% 40%, rgba(155, 92, 255, 0.14), transparent 28%),
        linear-gradient(to right, rgba(255, 0, 140, 0.08), transparent 35%, transparent 65%, rgba(120, 0, 255, 0.10));
      mix-blend-mode: screen;
      opacity: 0.92;
      pointer-events: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 34%, rgba(0,0,0,0.20) 64%, rgba(0,0,0,0.60) 100%);
      pointer-events: none;
    }

    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image:
        radial-gradient(rgba(255,255,255,0.8) 0.45px, transparent 0.55px);
      background-size: 6px 6px;
      mix-blend-mode: soft-light;
    }

    .particles,
    .particles::before,
    .particles::after {
      position: absolute;
      inset: 0;
      content: "";
      pointer-events: none;
    }

    .particles {
      background:
        radial-gradient(circle, rgba(255, 128, 210, 0.22) 0 1.2px, transparent 1.8px),
        radial-gradient(circle, rgba(180, 110, 255, 0.20) 0 1.1px, transparent 1.7px),
        radial-gradient(circle, rgba(255, 255, 255, 0.10) 0 1px, transparent 1.5px);
      background-size: 210px 210px, 270px 270px, 180px 180px;
      background-position: 0 0, 60px 40px, 110px 80px;
      filter: blur(0.25px);
      animation: driftOne 18s linear infinite;
      opacity: 0.8;
    }

    .particles::before {
      background:
        radial-gradient(circle, rgba(255, 70, 170, 0.16) 0 1.2px, transparent 1.9px),
        radial-gradient(circle, rgba(155, 92, 255, 0.16) 0 1.1px, transparent 1.8px);
      background-size: 320px 320px, 260px 260px;
      background-position: 20px 30px, 140px 120px;
      animation: driftTwo 24s linear infinite reverse;
      opacity: 0.7;
    }

    .particles::after {
      background:
        radial-gradient(circle, rgba(255,255,255,0.10) 0 0.9px, transparent 1.4px);
      background-size: 240px 240px;
      background-position: 90px 140px;
      animation: shimmer 8s ease-in-out infinite;
      opacity: 0.45;
    }

    .content {
      position: relative;
      z-index: 5;
      width: min(92vw, 880px);
      padding: 24px 18px;
      text-align: center;
      animation: fadeUp 1.2s ease both;
    }

    .eyebrow {
      margin: 0 0 14px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 0 12px rgba(255, 120, 220, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(72px, 14vw, 158px);
      line-height: 0.88;
      letter-spacing: -0.06em;
      font-weight: 800;
      text-transform: lowercase;
      color: #ffffff;
      text-shadow:
        0 0 18px rgba(255,255,255,0.05),
        0 0 34px rgba(255, 90, 190, 0.08);
    }

    h1 .soon {
      display: block;
      margin-top: 8px;
      background: linear-gradient(180deg, #ffd6fa 0%, #ebb2ff 35%, #d791ff 72%, #bf76ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 0 22px rgba(219, 122, 255, 0.15));
    }

    .subline {
      margin: 28px auto 0;
      max-width: 480px;
      font-size: clamp(17px, 2.1vw, 24px);
      line-height: 1.45;
      font-weight: 400;
      color: rgba(255,255,255,0.88);
      text-shadow: 0 0 18px rgba(255, 98, 180, 0.08);
    }

    .subline .break {
      display: block;
    }

    .cta-wrap {
      margin-top: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 288px;
      padding: 17px 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      color: #ffffff;
      text-decoration: none;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 12px 36px rgba(0,0,0,0.28),
        0 0 40px rgba(214, 98, 255, 0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease, background 0.28s ease;
    }

    .cta::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.28), rgba(255,255,255,0.04), rgba(255,130,220,0.22));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .cta:hover {
      transform: translateY(-2px) scale(1.012);
      border-color: rgba(255,255,255,0.28);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 16px 42px rgba(0,0,0,0.34),
        0 0 54px rgba(214, 98, 255, 0.16);
    }

    .cta:active {
      transform: translateY(0) scale(0.995);
    }

    .cta svg {
      width: 21px;
      height: 21px;
      flex: 0 0 auto;
    }

    .micro {
      margin-top: 16px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.54);
    }

    @keyframes slowFloat {
      from {
        transform: scale(1.035) translate3d(0, 0, 0);
      }
      to {
        transform: scale(1.06) translate3d(0, -8px, 0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes driftOne {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-26px);
      }
    }

    @keyframes driftTwo {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(22px);
      }
    }

    @keyframes shimmer {
      0%, 100% {
        opacity: 0.30;
      }
      50% {
        opacity: 0.55;
      }
    }

    @media (max-width: 980px) {
      .bg-image {
        background-position: center 18%;
      }

      .subline {
        max-width: 420px;
      }
    }

    @media (max-width: 680px) {
      .content {
        padding: 18px 14px 28px;
      }

      .bg-image {
        background-position: center 14%;
        transform: scale(1.08);
      }

      .eyebrow {
        font-size: 10px;
        letter-spacing: 0.34em;
        margin-bottom: 12px;
      }

      h1 {
        font-size: clamp(58px, 21vw, 108px);
        line-height: 0.9;
      }

      .subline {
        margin-top: 22px;
        font-size: 18px;
        line-height: 1.5;
        max-width: 320px;
      }

      .cta-wrap {
        margin-top: 28px;
      }

      .cta {
        min-width: 252px;
        padding: 16px 24px;
        font-size: 18px;
      }

      .micro {
        margin-top: 14px;
        font-size: 11px;
        letter-spacing: 0.08em;
      }
    }

    @media (max-width: 430px) {
      .bg-image {
        background-position: center 12%;
      }

      .subline .break {
        display: block;
      }

      .cta {
        min-width: 236px;
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="vignette"></div>
  <div class="grain"></div>
  <div class="particles"></div>

  <main class="content">
    <p class="eyebrow">Nova</p>

    <h1>
      coming
      <span class="soon">soon</span>
    </h1>

    <p class="subline">
      This is not random.
      <span class="break">You were meant to find this.</span>
    </p>

    <div class="cta-wrap">
      <a
        class="cta"
        href="https://instagram.com/youarenova.ai"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Enter Nova on Instagram"
      >
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="3.2" y="3.2" width="17.6" height="17.6" rx="5.2" stroke="currentColor" stroke-width="2"></rect>
          <circle cx="12" cy="12" r="4.1" stroke="currentColor" stroke-width="2"></circle>
          <circle cx="17.6" cy="6.4" r="1.2" fill="currentColor"></circle>
        </svg>
        <span>Enter Nova</span>
      </a>
    </div>

    <div class="micro">Only a few will understand.</div>
  </main>
</body>
</html>
