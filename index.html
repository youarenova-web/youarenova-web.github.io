<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova – Coming soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Montserrat Alternates', sans-serif;
      background: #07010d;
    }

    body {
      position: relative;
      color: white;
    }

    .background {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 0, 153, 0.16), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(163, 73, 255, 0.15), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(255, 0, 128, 0.10), transparent 30%),
        linear-gradient(180deg, #09020f 0%, #12031b 45%, #06010c 100%);
      z-index: 0;
    }

    .background::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 55%);
      filter: blur(20px);
      animation: pulseGlow 8s ease-in-out infinite;
    }

    .particles,
    .particles::before,
    .particles::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(255, 0, 170, 0.38) 1px, transparent 1px),
        radial-gradient(rgba(180, 90, 255, 0.30) 1px, transparent 1px),
        radial-gradient(rgba(255, 255, 255, 0.10) 1px, transparent 1px);
      background-size: 180px 180px, 240px 240px, 320px 320px;
      background-position: 0 0, 40px 60px, 100px 120px;
      animation: drift 24s linear infinite;
      opacity: 0.65;
      pointer-events: none;
    }

    .particles::before {
      animation-duration: 34s;
      opacity: 0.35;
      filter: blur(1px);
    }

    .particles::after {
      animation-duration: 44s;
      opacity: 0.2;
      filter: blur(2px);
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .hero {
      width: 100%;
      max-width: 1400px;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      align-items: center;
      gap: 40px;
    }

    .content {
      max-width: 560px;
      padding-left: 2vw;
      animation: fadeUp 1.2s ease-out;
    }

    .eyebrow {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(42px, 8vw, 96px);
      line-height: 0.92;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 24px;
      text-shadow:
        0 0 20px rgba(255, 0, 140, 0.10),
        0 0 40px rgba(186, 85, 255, 0.08);
    }

    .sub {
      font-size: clamp(16px, 2vw, 22px);
      line-height: 1.6;
      color: rgba(255,255,255,0.82);
      margin-bottom: 34px;
      max-width: 480px;
    }

    .sub .break {
      display: block;
      height: 14px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 30px;
      border-radius: 999px;
      text-decoration: none;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.14);
      background:
        linear-gradient(135deg, rgba(255, 0, 153, 0.26), rgba(140, 60, 255, 0.18));
      box-shadow:
        0 10px 35px rgba(214, 0, 143, 0.18),
        inset 0 0 20px rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .cta:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: rgba(255,255,255,0.28);
      box-shadow:
        0 16px 50px rgba(214, 0, 143, 0.28),
        inset 0 0 24px rgba(255,255,255,0.05);
    }

    .visual {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 78vh;
      animation: floatIn 1.5s ease-out;
    }

    .visual::before {
      content: "";
      position: absolute;
      width: 70%;
      height: 70%;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,0,170,0.22) 0%, rgba(167,67,255,0.12) 35%, transparent 70%);
      filter: blur(30px);
      animation: auraPulse 6s ease-in-out infinite;
      z-index: 1;
    }

    .image-stack {
      position: relative;
      width: min(42vw, 620px);
      aspect-ratio: 4 / 5.2;
      z-index: 2;
      filter:
        drop-shadow(0 24px 70px rgba(0,0,0,0.45))
        drop-shadow(0 0 45px rgba(255, 0, 153, 0.16))
        drop-shadow(0 0 70px rgba(163, 73, 255, 0.12));
    }

    .image-stack img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 28px;
      user-select: none;
      -webkit-user-drag: none;
    }

    .image-one {
      opacity: 1;
      animation: imageFade1 14s ease-in-out infinite;
    }

    .image-two {
      opacity: 0;
      animation: imageFade2 14s ease-in-out infinite;
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0.05;
      mix-blend-mode: screen;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          transparent 1px,
          transparent 2px
        );
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulseGlow {
      0%, 100% {
        opacity: 0.6;
        transform: scale(1);
      }
      50% {
        opacity: 0.95;
        transform: scale(1.03);
      }
    }

    @keyframes drift {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-40px);
      }
    }

    @keyframes auraPulse {
      0%, 100% {
        opacity: 0.75;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.06);
      }
    }

    @keyframes imageFade1 {
      0%, 42% {
        opacity: 1;
        transform: scale(1) translateY(0px);
      }
      50%, 92% {
        opacity: 0;
        transform: scale(1.02) translateY(-4px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0px);
      }
    }

    @keyframes imageFade2 {
      0%, 42% {
        opacity: 0;
        transform: scale(1.02) translateY(-4px);
      }
      50%, 92% {
        opacity: 1;
        transform: scale(1) translateY(0px);
      }
      100% {
        opacity: 0;
        transform: scale(1.02) translateY(-4px);
      }
    }

    @media (max-width: 980px) {
      html,
      body {
        overflow-y: auto;
      }

      .wrap {
        height: auto;
        min-height: 100%;
        padding: 56px 20px 42px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .content {
        order: 2;
        text-align: center;
        margin: 0 auto;
        padding-left: 0;
      }

      .sub {
        margin-left: auto;
        margin-right: auto;
      }

      .visual {
        order: 1;
        min-height: auto;
      }

      .image-stack {
        width: min(88vw, 460px);
        margin: 0 auto;
      }
    }

    @media (max-width: 640px) {
      .eyebrow {
        margin-bottom: 18px;
      }

      h1 {
        font-size: clamp(36px, 14vw, 64px);
      }

      .sub {
        font-size: 16px;
        line-height: 1.7;
      }

      .sub .break {
        height: 12px;
      }

      .cta {
        width: 100%;
        max-width: 320px;
      }

      .visual {
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="particles"></div>
  </div>

  <div class="grain"></div>

  <main class="wrap">
    <section class="hero">
      <div class="content">
        <div class="eyebrow">Nova</div>
        <h1>Coming<br />soon.</h1>
        <p class="sub">
          Something powerful is taking shape.
          <span class="break"></span>
          Follow the journey now.
        </p>
        <a class="cta" href="https://instagram.com/youarenova.ai/" target="_blank" rel="noopener noreferrer">
          Follow Nova
        </a>
      </div>

      <div class="visual">
        <div class="image-stack">
          <img src="Nova-final-01.jpg" alt="Nova" class="image-one" />
          <img src="Nova-final.jpg" alt="Nova alternate" class="image-two" />
        </div>
      </div>
    </section>
  </main>
</body>
</html>
